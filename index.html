<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onpoint Fleet Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:#f4f7fc;padding:20px;}
        .header{background:#1e3a8a;color:white;padding:15px 20px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;}
        .header a{color:white;text-decoration:none;padding:8px 15px;background:#2e4a9e;border-radius:5px;}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px;}
        .stat-card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .filters{background:white;padding:15px;border-radius:10px;margin-bottom:20px;}
        select{padding:8px;margin-right:10px;border-radius:5px;border:1px solid #ddd;}
        table{width:100%;background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        th{background:#1e3a8a;color:white;padding:12px;text-align:left;}
        td{padding:10px;border-bottom:1px solid #eee;}
        .loading{text-align:center;padding:50px;font-size:18px;color:#666;}
        .error{background:#fee2e2;color:#b91c1c;padding:20px;border-radius:10px;margin-bottom:20px;border:1px solid #fecaca;}
        .debug-info{background:#e6f3ff;padding:15px;border-radius:8px;margin-top:10px;font-family:monospace;font-size:12px;}
        .hidden{display:none;}
        .btn{background:#1e3a8a;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;margin-right:10px;}
        .btn:hover{background:#2e4a9e;}
    </style>
</head>
<body>
    <div class="header">
        <h1>🚚 Onpoint Fleet Incident Dashboard</h1>
        <div>
            <a href="index.html">🏠 Home</a>
            <a href="index.html" style="margin-left:10px;background:#b91c1c;">🚪 Logout</a>
        </div>
    </div>

    <div id="loading" class="loading">Loading data from Google Sheets...</div>
    
    <div id="error" class="error hidden">
        <h3>⚠️ Error Loading Data</h3>
        <p id="errorMessage"></p>
        <div id="debugInfo" class="debug-info hidden"></div>
        <button class="btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="btn" onclick="checkSheet()">🔍 Check Sheet Name</button>
    </div>
    
    <div id="content" class="hidden">
        <div class="stats" id="stats"></div>
        
        <div class="filters">
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="resolved">Resolved</option>
            </select>
            <select id="vehicleFilter">
                <option value="all">All Vehicles</option>
            </select>
            <span id="lastUpdate" style="float:right;color:#666;"></span>
        </div>

        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Vehicle</th>
                        <th>Driver</th>
                        <th>Accident Type</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Police Report</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywofRSo-aJWQEoQ47XwoHYnJC2mSe_kcxpl2gEcf4f95xFYNLnWBXcnmgSLeX-BpbP/exec';
        
        let allData = [];

        function showError(msg, debug = null) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = msg;
            
            if (debug) {
                document.getElementById('debugInfo').classList.remove('hidden');
                document.getElementById('debugInfo').innerText = typeof debug === 'string' ? debug : JSON.stringify(debug, null, 2);
            }
        }

        function checkSheet() {
            window.open('https://docs.google.com/spreadsheets/d/1vhtaNNmY-YsyDiaA2IFodoBYdQsEcL09F7BgMJo4utI/edit', '_blank');
        }

        async function loadData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now());
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error, { 
                        message: 'The Apps Script returned an error',
                        scriptResponse: data,
                        sheetId: '1vhtaNNmY-YsyDiaA2IFodoBYdQsEcL09F7BgMJo4utI',
                        expectedSheetName: 'Onpoint Incident Fleet Report'
                    });
                    return;
                }
                
                if (data.sheetName) {
                    console.log('Connected to sheet:', data.sheetName);
                }
                
                allData = data.data || [];
                
                if (allData.length === 0) {
                    showError('The sheet exists but contains no data', { 
                        sheetName: data.sheetName || 'Unknown',
                        rowCount: 0 
                    });
                    return;
                }
                
                // Update UI
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                
                updateFilters();
                renderData();
                document.getElementById('lastUpdate').innerHTML = '🕐 Updated: ' + new Date().toLocaleTimeString();
                
            } catch (err) {
                showError('Failed to connect: ' + err.message, { 
                    error: err.toString(),
                    url: APPS_SCRIPT_URL
                });
            }
        }

        function updateFilters() {
            const vehicles = [...new Set(allData.map(d => d['Vehicle Reg'] || d.vehicle).filter(Boolean))].sort();
            const select = document.getElementById('vehicleFilter');
            vehicles.forEach(v => {
                select.innerHTML += `<option value="${v}">${v}</option>`;
            });
        }

        function renderData() {
            const status = document.getElementById('statusFilter').value;
            const vehicle = document.getElementById('vehicleFilter').value;
            
            const filtered = allData.filter(d => {
                if (status !== 'all' && (d.Status || '').toLowerCase() !== status) return false;
                if (vehicle !== 'all' && (d['Vehicle Reg'] || d.vehicle) !== vehicle) return false;
                return true;
            });

            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><h3>Total</h3><h2>${filtered.length}</h2></div>
                <div class="stat-card"><h3>Active</h3><h2>${filtered.filter(d => (d.Status || '').toLowerCase() === 'active').length}</h2></div>
                <div class="stat-card"><h3>Police Reports</h3><h2>${filtered.filter(d => d['Police Report #']).length}</h2></div>
                <div class="stat-card"><h3>With Images</h3><h2>${filtered.filter(d => d['Image Drive URL']).length}</h2></div>
            `;

            let html = '';
            filtered.slice(0, 100).forEach(d => {
                html += `<tr>
                    <td>${d.Date || d.date || ''}</td>
                    <td><b>${d['Vehicle Reg'] || d.vehicle || ''}</b></td>
                    <td>${d['Driver Name'] || d.driver || ''}</td>
                    <td>${d['Accident Type'] || d.incident || ''}</td>
                    <td>${d.Location || d.location || ''}</td>
                    <td>${d.Status || d.status || 'Active'}</td>
                    <td>${d['Police Report #'] || ''}</td>
                </tr>`;
            });
            document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="7" style="text-align:center;">No data</td></tr>';
        }

        document.getElementById('statusFilter').addEventListener('change', renderData);
        document.getElementById('vehicleFilter').addEventListener('change', renderData);

        loadData();
    </script>
</body>
</html>
