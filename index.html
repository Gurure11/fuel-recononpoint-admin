<!DOCTYPE html>
<html>
<head>
    <title>Upload to Google Drive</title>
</head>
<body>
    <h2>Upload Form</h2>
    
    <form id="uploadForm">
        <label>Your Name:</label>
        <input type="text" id="userName" required><br><br>
        
        <label>Description:</label>
        <textarea id="description" rows="3"></textarea><br><br>
        
        <label>Select Image:</label>
        <input type="file" id="imageFile" accept="image/*" required><br><br>
        
        <button type="button" onclick="uploadToDrive()">Upload to Drive</button>
    </form>
    
    <div id="result"></div>

    <script>
    function uploadToDrive() {
        // 1. Get form values
        const userName = document.getElementById('userName').value;
        const description = document.getElementById('description').value;
        const fileInput = document.getElementById('imageFile');
        
        if (!userName || !fileInput.files[0]) {
            alert('Please fill all fields');
            return;
        }
        
        const file = fileInput.files[0];
        document.getElementById('result').innerHTML = 'Uploading...';
        
        // 2. Convert image to Base64
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            
            // 3. Send to Google Apps Script
            fetch('https://script.google.com/macros/s/AKfycbxxzp6tlWQSDM-w5p86pR1qhDudHkiqOhYux_YtHz6ejIdmT6HVA4Vg-7lqMj30t_AS/exec', {
                method: 'POST',
                mode: 'no-cors',  // Bypasses CORS!
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    userName: userName,
                    description: description,
                    fileName: file.name,
                    fileType: file.type,
                    fileData: base64Data
                })
            })
            .then(() => {
                document.getElementById('result').innerHTML = 
                    '✅ Upload sent! Check your Google Drive in a few seconds.';
                document.getElementById('uploadForm').reset();
            })
            .catch(error => {
                document.getElementById('result').innerHTML = 
                    '❌ Error: ' + error.message;
            });
        };
        
        reader.readAsDataURL(file);  // Converts to Base64
    }
    </script>
</body>
</html>
