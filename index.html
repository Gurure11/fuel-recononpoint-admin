<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>OnPoint Ontime Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>OnPoint Ontime Reports</h1>

</header>

<section class="cards">

<div class="card">
<i class="fa fa-file"></i>
<h3>Total Reports</h3>
<p id="totalReports">0</p>
</div>

<div class="card">
<i class="fa fa-truck"></i>
<h3>Vehicles Involved</h3>
<p id="vehicles">0</p>
</div>

<div class="card">
<i class="fa fa-exclamation-triangle"></i>
<h3>Accidents Today</h3>
<p id="today">0</p>
</div>

<div class="card">
<i class="fa fa-check-circle"></i>
<h3>Resolved</h3>
<p id="resolved">0</p>
</div>

</section>

<section class="charts">

<canvas id="accidentType"></canvas>

</section>

<section class="tableSection">

<input type="text" id="search" placeholder="Search reports...">

<table id="reportTable">

<thead>

<tr>
<th>ID</th>
<th>Date</th>
<th>Driver</th>
<th>Vehicle</th>
<th>Type</th>
<th>Status</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</section>

<script src="script.js"></script>

</body>
</html>
