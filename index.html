<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onpoint Cleaning - Checklist App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            min-height: 80px;
        }

        .logo-container {
            max-width: 200px;
            max-height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 60px;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        /* Edit this section to embed your logo */
        .company-logo {
            display: block;
        }
        
        /* Replace the src URL with your logo image URL */
        .company-logo img {
            src: url('your-logo-url-here.png');
            alt: "Onpoint Cleaning Logo";
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .cleaner-info {
            background: #f8f9fa;
            padding: 25px;
            border-bottom: 2px solid #e9ecef;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .centers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 25px;
        }

        .center-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .center-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .center-header h3 {
            font-size: 1.2em;
        }

        .areas-list {
            padding: 20px;
        }

        .area-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .area-item:last-child {
            border-bottom: none;
        }

        .area-label {
            font-weight: 500;
            color: #495057;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .maintenance-section {
            background: #fff3cd;
            padding: 25px;
            border-top: 3px solid #ffc107;
        }

        .maintenance-section h3 {
            color: #856404;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .maintenance-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .maintenance-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .maintenance-item select, .maintenance-item textarea {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
        }

        .submit-section {
            padding: 25px;
            background: #f8f9fa;
            text-align: center;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .timestamp {
            text-align: right;
            padding: 10px 25px;
            background: #f8f9fa;
            color: #6c757d;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .centers-grid {
                grid-template-columns: 1fr;
            }
            
            .checkbox-group {
                flex-direction: column;
                gap: 5px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-section">
                <div class="logo-container">
                    <!-- EDIT THIS SECTION TO EMBED YOUR LOGO -->
                    <!-- Option 1: Replace the src URL with your logo's URL -->
                    <img src="logo2.png" alt="Onpoint Cleaning Logo" style="max-width: 100%; max-height: 60px;">
                    
                    <!-- Option 2: If you have a base64 encoded image, use it like this: -->
                    <!-- <img src="data:image/png;base64,YOUR_BASE64_ENCODED_IMAGE_HERE" alt="Onpoint Cleaning Logo"> -->
                    
                    <!-- Option 3: If you want to use a local file, put it in the same folder and use: -->
                    <!-- <img src="onpoint-logo.png" alt="Onpoint Cleaning Logo"> -->
                </div>
            </div>
            <h1>Onpoint Cleaning Checklist</h1>
            <p>Professional Cleaning Management System</p>
        </div>

        <div class="cleaner-info">
            <div class="form-grid">
                <div class="form-group">
                    <label>👤 Cleaner's Full Name *</label>
                    <input type="text" id="cleanerName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>📋 Employee ID</label>
                    <input type="text" id="employeeId" placeholder="Enter employee ID">
                </div>
                <div class="form-group">
                    <label>📅 Date</label>
                    <input type="date" id="cleaningDate">
                </div>
                <div class="form-group">
                    <label>⏰ Time</label>
                    <input type="time" id="cleaningTime">
                </div>
            </div>
        </div>

        <div class="centers-grid" id="centersContainer">
            <!-- Centers will be dynamically generated here -->
        </div>

        <div class="maintenance-section">
            <h3>🔧 Maintenance & Repairs Needed</h3>
            <div class="maintenance-items">
                <div class="maintenance-item">
                    <label>Select Center:</label>
                    <select id="maintenanceCenter">
                        <option value="">Select a center...</option>
                        <option value="Onpoint Group Head Office">Onpoint Group Head Office</option>
                        <option value="DI Solutions">DI Solutions</option>
                        <option value="Aqua Telecoms">Aqua Telecoms</option>
                        <option value="N Kanyezi Projects">N Kanyezi Projects</option>
                        <option value="Onpoint Ontime Solutions">Onpoint Ontime Solutions</option>
                    </select>
                </div>
                <div class="maintenance-item">
                    <label>Select Area:</label>
                    <select id="maintenanceArea">
                        <option value="">Select an area...</option>
                        <option value="Toilet">Toilet</option>
                        <option value="Kitchen">Kitchen</option>
                        <option value="Offices">Offices</option>
                        <option value="Windows">Windows</option>
                        <option value="Floors">Floors</option>
                        <option value="Reception">Reception</option>
                        <option value="Doors">Doors</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Fridge">Fridge</option>
                    </select>
                </div>
                <div class="maintenance-item">
                    <label>Description of Issue:</label>
                    <textarea id="maintenanceDescription" rows="2" placeholder="Describe what needs repair..."></textarea>
                </div>
            </div>
        </div>

        <div class="submit-section">
            <button class="btn-submit" onclick="submitChecklist()" id="submitBtn">✓ SUBMIT CLEANING REPORT</button>
            <div class="status-message" id="statusMessage"></div>
        </div>

        <div class="timestamp" id="currentTimestamp"></div>
    </div>

    <script>
        // Configuration - Your Google Apps Script URL
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_T2OgWynPXIYIF625O9vxDbfPqhCb0aF3A89NrgN3rKw5CPvx22kJMBjNopQzLKvjdg/exec';
        
        const centers = [
            "Onpoint Group Head Office",
            "DI Solutions",
            "Aqua Telecoms",
            "N Kanyezi Projects",
            "Onpoint Ontime Solutions"
        ];

        const areas = [
            "Toilet", "Kitchen", "Offices", "Windows", 
            "Floors", "Reception", "Doors", "Furniture", "Fridge"
        ];

        // Generate centers dynamically
        function generateCenters() {
            const container = document.getElementById('centersContainer');
            container.innerHTML = '';

            centers.forEach((center, index) => {
                const centerCard = document.createElement('div');
                centerCard.className = 'center-card';
                centerCard.innerHTML = `
                    <div class="center-header">
                        <h3>${center}</h3>
                    </div>
                    <div class="areas-list" id="center-${index}">
                        ${generateAreas(center, index)}
                    </div>
                `;
                container.appendChild(centerCard);
            });
        }

        function generateAreas(center, centerIndex) {
            let html = '';
            areas.forEach((area, areaIndex) => {
                html += `
                    <div class="area-item">
                        <span class="area-label">${area}</span>
                        <div class="checkbox-group">
                            <label>
                                <input type="radio" name="${center}-${area}" value="cleaned" data-center="${center}" data-area="${area}"> Cleaned
                            </label>
                            <label>
                                <input type="radio" name="${center}-${area}" value="not-cleaned" data-center="${center}" data-area="${area}"> Not Cleaned
                            </label>
                            <label>
                                <input type="checkbox" name="${center}-${area}-needs-attention" data-center="${center}" data-area="${area}"> Needs Attention
                            </label>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        // Update timestamp
        function updateTimestamp() {
            const now = new Date();
            const timestamp = document.getElementById('currentTimestamp');
            timestamp.textContent = `Last updated: ${now.toLocaleString()}`;
        }
        setInterval(updateTimestamp, 1000);

        // Collect all data
        function collectData() {
            const cleanerName = document.getElementById('cleanerName').value;
            const employeeId = document.getElementById('employeeId').value;
            const cleaningDate = document.getElementById('cleaningDate').value;
            const cleaningTime = document.getElementById('cleaningTime').value;

            if (!cleanerName) {
                throw new Error('Please enter cleaner name');
            }

            const cleaningData = [];
            
            // Collect cleaning status
            centers.forEach(center => {
                areas.forEach(area => {
                    const cleanedRadio = document.querySelector(`input[name="${center}-${area}"][value="cleaned"]`);
                    const notCleanedRadio = document.querySelector(`input[name="${center}-${area}"][value="not-cleaned"]`);
                    const needsAttentionCheck = document.querySelector(`input[name="${center}-${area}-needs-attention"]`);
                    
                    let status = 'Not Specified';
                    if (cleanedRadio && cleanedRadio.checked) status = 'Cleaned';
                    else if (notCleanedRadio && notCleanedRadio.checked) status = 'Not Cleaned';
                    
                    cleaningData.push({
                        Center: center,
                        Area: area,
                        Status: status,
                        NeedsAttention: needsAttentionCheck ? needsAttentionCheck.checked : false
                    });
                });
            });

            // Collect maintenance data
            const maintenanceCenter = document.getElementById('maintenanceCenter').value;
            const maintenanceArea = document.getElementById('maintenanceArea').value;
            const maintenanceDescription = document.getElementById('maintenanceDescription').value;

            return {
                CleanerName: cleanerName,
                EmployeeId: employeeId,
                Date: cleaningDate,
                Time: cleaningTime,
                CleaningData: cleaningData,
                Maintenance: {
                    Center: maintenanceCenter,
                    Area: maintenanceArea,
                    Description: maintenanceDescription
                },
                SubmissionTimestamp: new Date().toISOString()
            };
        }

        // Submit to Google Sheets via Google Apps Script
        async function submitChecklist() {
            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');
            
            try {
                const data = collectData();
                
                submitBtn.disabled = true;
                statusMessage.className = 'status-message';
                statusMessage.textContent = 'Submitting...';
                statusMessage.style.display = 'block';

                // Send data to Google Apps Script
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // This is needed for Google Apps Script
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                // With no-cors mode, we can't read response
                // So we assume success if no error thrown
                statusMessage.className = 'status-message success';
                statusMessage.textContent = '✓ Cleaning report submitted successfully!';
                
                // Reset form after successful submission
                setTimeout(() => {
                    resetForm();
                }, 2000);

            } catch (error) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = error.message || 'Error submitting report. Please try again.';
                console.error('Submission error:', error);
            } finally {
                submitBtn.disabled = false;
            }
        }

        // Reset form after submission
        function resetForm() {
            // Clear all radio buttons and checkboxes
            const radios = document.querySelectorAll('input[type="radio"]');
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            
            radios.forEach(radio => radio.checked = false);
            checkboxes.forEach(checkbox => checkbox.checked = false);
            
            // Clear maintenance section
            document.getElementById('maintenanceCenter').value = '';
            document.getElementById('maintenanceArea').value = '';
            document.getElementById('maintenanceDescription').value = '';
            
            // Show success message that fades
            const statusMessage = document.getElementById('statusMessage');
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 5000);
        }

        // Initialize on page load
        window.onload = function() {
            generateCenters();
            updateTimestamp();
            
            // Set default date and time
            const today = new Date();
            document.getElementById('cleaningDate').value = today.toISOString().split('T')[0];
            document.getElementById('cleaningTime').value = today.toTimeString().slice(0,5);
        };
    </script>
</body>
</html>
