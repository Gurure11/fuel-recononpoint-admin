<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onpoint Group · Fuel Recon</title>
    <!-- Bootstrap 5 + icons + chart.js -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #f0f5fa; font-family: 'Segoe UI', system-ui; }
        .glass-card { background: white; border-radius: 2rem; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-onpoint { background: #0b2b4a; color: white; border-radius: 40px; padding: 0.6rem 2rem; border: none; }
        .btn-onpoint:hover { background: #1f4a6e; }
        .badge-approved { background: #dff0d8; color: #2e6b2e; padding: 0.3rem 1rem; border-radius: 30px; }
        .badge-missing { background: #fef1d6; color: #a66907; padding: 0.3rem 1rem; border-radius: 30px; }
        .badge-mismatch { background: #fadddd; color: #a33a3a; padding: 0.3rem 1rem; border-radius: 30px; }
        .filter-chip { background: white; border-radius: 40px; padding: 0.5rem 1.2rem; cursor: pointer; border: 1px solid #dee2e6; }
        .filter-chip.active { background: #0b2b4a; color: white; }
        .connection-status { font-size: 0.8rem; padding: 0.3rem 1rem; border-radius: 20px; background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-3">
                <i class="fas fa-gas-pump fa-3x" style="color:#0b2b4a;"></i>
                <h2 class="fw-bold" style="color:#0b2b4a;">Onpoint Group · Fuel Recon</h2>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="connection-status" id="connectionStatus">
                    <i class="fas fa-circle-notch fa-spin me-1"></i>Checking...
                </span>
            </div>
        </div>

        <!-- KPI Row -->
        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="stat-card p-3 bg-white rounded-4"><span class="text-secondary">Total Swipes</span><h3 id="totalSwipes">0</h3></div></div>
            <div class="col-md-3"><div class="stat-card p-3 bg-white rounded-4"><span class="text-secondary">Approved</span><h3 id="totalApproved">0</h3></div></div>
            <div class="col-md-3"><div class="stat-card p-3 bg-white rounded-4"><span class="text-secondary">Not Approved</span><h3 id="totalNoEr">0</h3></div></div>
            <div class="col-md-3"><div class="stat-card p-3 bg-white rounded-4"><span class="text-secondary">Total Variance</span><h3 id="totalVariance">R0</h3></div></div>
        </div>

        <!-- Input Form -->
        <div class="glass-card mb-4">
            <div class="row g-3">
                <div class="col-md-2"><input type="date" id="swipeDate" class="form-control rounded-pill" value="2025-03-25"></div>
                <div class="col-md-2">
                    <select id="costCenter" class="form-select rounded-pill">
                        <option>Onpoint Group HQ</option><option>DI Solutions</option><option>Aqua Telecoms</option>
                        <option>Nkanyezi Projects</option><option>Onpoint Ontime Solutions</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select id="department" class="form-select rounded-pill">
                        <option>Admin</option><option>Fleet</option><option>Operations</option><option>Sales</option>
                        <option>Finance & IT</option><option>Warehouse</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select id="driverName" class="form-select rounded-pill">
                        <option>Moses</option><option>Paul</option><option>Nkanyeko</option><option>Thebo</option>
                        <option>Tebello</option><option>Michael</option><option>Devon</option><option>Joseph</option>
                    </select>
                </div>
                <div class="col-md-2"><input type="text" id="erNo" class="form-control rounded-pill" placeholder="ER No. or 0"></div>
                <div class="col-md-2"><input type="number" id="erAmount" class="form-control rounded-pill" placeholder="R.Amount (Requested)"></div>
                <div class="col-md-2"><input type="number" id="swipeAmount" class="form-control rounded-pill" placeholder="Swiped amount"></div>
                <div class="col-12 text-end">
                    <button class="btn btn-onpoint px-5" id="addSwipeBtn"><i class="fas fa-save me-2"></i>Save Record</button>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="d-flex gap-3 mb-4">
            <span class="filter-chip active" id="filterAll">All</span>
            <span class="filter-chip" id="filterApproved">Approved</span>
            <span class="filter-chip" id="filterNotApproved">Not Approved</span>
            <div class="ms-auto">
                <input type="text" id="searchInput" class="form-control rounded-pill" placeholder="Search...">
            </div>
        </div>

        <!-- Tables -->
        <div class="row">
            <div class="col-12">
                <div class="glass-card">
                    <ul class="nav nav-tabs" id="tab">
                        <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#all">All Records</a></li>
                        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#exceptions">Exceptions</a></li>
                    </ul>
                    <div class="tab-content mt-3">
                        <div class="tab-pane active" id="all">
                            <div style="max-height:400px; overflow:auto">
                                <table class="table table-sm">
                                    <thead><tr><th>Date</th><th>Driver</th><th>ER No.</th><th>Requested (R)</th><th>Swiped (R)</th><th>Variance (R)</th><th>Status</th></tr></thead>
                                    <tbody id="allRecordsBody"></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="tab-pane" id="exceptions">
                            <div style="max-height:400px; overflow:auto">
                                <table class="table table-sm">
                                    <thead><tr><th>Date</th><th>Driver</th><th>ER No.</th><th>Requested (R)</th><th>Swiped (R)</th><th>Issue</th></tr></thead>
                                    <tbody id="discrepancyBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PDF Button -->
        <div class="text-end mt-3">
            <button class="btn btn-outline-secondary rounded-pill" id="exportPdfBtn"><i class="far fa-file-pdf me-2"></i>Export PDF</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            // ============================================================
            // ONLY ONE PLACE TO UPDATE - REPLACE THIS URL WITH YOUR ACTUAL APPS SCRIPT URL
            // ============================================================
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbwu2XscmBfnUTGy8ohNgqBJCi5n7CAXeu33_xW7LzJjAfG82KZb_qPEGVkrnnflis5r/exec';  // <--- CHANGE THIS ONE LINE ONLY
            
            // Your sheet IDs (these are correct)
            const SHEET_ID = '1lgQdmhMDk9UYtN1v-aLf6MnodF-W0fMDS-d_yZ6Lcl4';
            const SHEET_NAME = 'Fuel Recon';
            const DRIVE_FOLDER_ID = '1al8guXtgk-PJWwdNvd2umUXYv4AvwXSM';

            // Data store
            let fuelRecords = [
                { id: '1', date: '2025-03-18', driver: 'Moses', department: 'Fleet', costCenter: 'Onpoint Group HQ', erNo: 'ER-101', erAmount: 250.00, swipeAmount: 245.75 },
                { id: '2', date: '2025-03-18', driver: 'Paul', department: 'Operations', costCenter: 'DI Solutions', erNo: 'ER-102', erAmount: 190.00, swipeAmount: 189.30 },
                { id: '3', date: '2025-03-19', driver: 'Nkanyeko', department: 'Warehouse', costCenter: 'Aqua Telecoms', erNo: '0', erAmount: 0, swipeAmount: 312.20 },
                { id: '4', date: '2025-03-19', driver: 'Thebo', department: 'Sales', costCenter: 'Nkanyezi Projects', erNo: 'ER-104', erAmount: 100.00, swipeAmount: 98.40 },
                { id: '5', date: '2025-03-20', driver: 'Tebello', department: 'Finance & IT', costCenter: 'Onpoint Ontime Solutions', erNo: 'ER-105', erAmount: 570.00, swipeAmount: 567.80 }
            ];

            let chartInstance = null;
            let currentFilter = 'all';

            // Test connection (only runs if URL is not placeholder)
            function testConnection() {
                const statusEl = document.getElementById('connectionStatus');
                
                if (GAS_URL.includes('YOUR_ACTUAL_SCRIPT_ID')) {
                    statusEl.innerHTML = '<i class="fas fa-exclamation-triangle text-warning me-1"></i>Update GAS_URL in line 98';
                    return;
                }

                const callbackName = 'test_' + Date.now();
                const timeout = setTimeout(() => {
                    statusEl.innerHTML = '<i class="fas fa-exclamation-triangle text-warning me-1"></i>Offline mode';
                    cleanup();
                }, 3000);

                function cleanup() {
                    clearTimeout(timeout);
                    if (window[callbackName]) delete window[callbackName];
                    const script = document.querySelector(`script[src*="${callbackName}"]`);
                    if (script) script.remove();
                }

                window[callbackName] = function() {
                    clearTimeout(timeout);
                    statusEl.innerHTML = '<i class="fas fa-check-circle text-success me-1"></i>Connected';
                    cleanup();
                };

                const script = document.createElement('script');
                script.src = GAS_URL + '?callback=' + callbackName + '&test=1';
                script.onerror = function() {
                    statusEl.innerHTML = '<i class="fas fa-exclamation-triangle text-warning me-1"></i>Offline mode';
                    cleanup();
                };
                document.body.appendChild(script);
            }

            // Save to Google Sheets
            function saveToSheet(record) {
                return new Promise((resolve) => {
                    // Skip if URL not set
                    if (GAS_URL.includes('YOUR_ACTUAL_SCRIPT_ID')) {
                        resolve({ status: 'local' });
                        return;
                    }

                    const callbackName = 'cb_' + Date.now();
                    const timeout = setTimeout(() => {
                        cleanup();
                        resolve({ status: 'local' });
                    }, 5000);

                    function cleanup() {
                        clearTimeout(timeout);
                        if (window[callbackName]) delete window[callbackName];
                        const script = document.querySelector(`script[src*="${callbackName}"]`);
                        if (script) script.remove();
                    }

                    window[callbackName] = function(response) {
                        clearTimeout(timeout);
                        cleanup();
                        resolve(response || { status: 'success' });
                    };

                    const params = new URLSearchParams({
                        callback: callbackName,
                        date: record.date,
                        driver: record.driver,
                        department: record.department,
                        costCenter: record.costCenter,
                        erNo: record.erNo,
                        erAmount: record.erAmount || 0,
                        swipeAmount: record.swipeAmount,
                        timestamp: new Date().toISOString()
                    });

                    const script = document.createElement('script');
                    script.src = GAS_URL + '?' + params.toString();
                    script.onerror = function() {
                        cleanup();
                        resolve({ status: 'local' });
                    };
                    document.body.appendChild(script);
                });
            }

            // Refresh UI
            function refreshUI() {
                const filtered = fuelRecords.filter(r => {
                    if (currentFilter === 'approved') return r.erNo && r.erNo !== '0';
                    if (currentFilter === 'notApproved') return !r.erNo || r.erNo === '0';
                    return true;
                });

                // Update counts
                document.getElementById('totalSwipes').innerText = fuelRecords.length;
                document.getElementById('totalApproved').innerText = fuelRecords.filter(r => r.erNo && r.erNo !== '0').length;
                document.getElementById('totalNoEr').innerText = fuelRecords.filter(r => !r.erNo || r.erNo === '0').length;
                
                const totalVar = fuelRecords.reduce((acc, r) => acc + (r.swipeAmount - (r.erAmount || 0)), 0);
                document.getElementById('totalVariance').innerText = 'R' + totalVar.toFixed(2);

                // All records table
                let allHtml = '';
                filtered.forEach(r => {
                    const variance = (r.swipeAmount - (r.erAmount || 0)).toFixed(2);
                    const status = (r.erNo && r.erNo !== '0') ? '<span class="badge-approved">approved</span>' : '<span class="badge-missing">not approved</span>';
                    allHtml += `<tr>
                        <td>${r.date}</td><td>${r.driver}</td><td>${r.erNo || '0'}</td>
                        <td>R${(r.erAmount || 0).toFixed(2)}</td><td>R${r.swipeAmount.toFixed(2)}</td>
                        <td class="${parseFloat(variance) < 0 ? 'text-danger' : 'text-success'}">R${variance}</td>
                        <td>${status}</td>
                    </tr>`;
                });
                document.getElementById('allRecordsBody').innerHTML = allHtml || '<tr><td colspan="7" class="text-center">No records</td></tr>';

                // Exceptions table
                let discHtml = '';
                filtered.forEach(r => {
                    const variance = r.swipeAmount - (r.erAmount || 0);
                    if (!r.erNo || r.erNo === '0') {
                        discHtml += `<tr class="table-warning">
                            <td>${r.date}</td><td>${r.driver}</td><td>0</td>
                            <td>R0</td><td>R${r.swipeAmount.toFixed(2)}</td>
                            <td><span class="badge-missing">No ER</span></td>
                        </tr>`;
                    } else if (Math.abs(variance) > 0.5) {
                        discHtml += `<tr class="table-danger">
                            <td>${r.date}</td><td>${r.driver}</td><td>${r.erNo}</td>
                            <td>R${(r.erAmount || 0).toFixed(2)}</td><td>R${r.swipeAmount.toFixed(2)}</td>
                            <td><span class="badge-mismatch">Variance R${variance.toFixed(2)}</span></td>
                        </tr>`;
                    }
                });
                document.getElementById('discrepancyBody').innerHTML = discHtml || '<tr><td colspan="6" class="text-center">No exceptions</td></tr>';
            }

            // Event Listeners
            document.getElementById('addSwipeBtn').addEventListener('click', async function() {
                const record = {
                    date: document.getElementById('swipeDate').value,
                    costCenter: document.getElementById('costCenter').value,
                    department: document.getElementById('department').value,
                    driver: document.getElementById('driverName').value,
                    erNo: document.getElementById('erNo').value.trim() || '0',
                    erAmount: parseFloat(document.getElementById('erAmount').value) || 0,
                    swipeAmount: parseFloat(document.getElementById('swipeAmount').value)
                };

                if (!record.date || isNaN(record.swipeAmount)) {
                    alert('Please enter date and swipe amount');
                    return;
                }

                record.id = Date.now() + '-' + Math.random().toString(36);
                fuelRecords.push(record);
                
                const btn = this;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
                
                await saveToSheet(record);
                
                btn.innerHTML = '<i class="fas fa-check me-2"></i>Saved!';
                setTimeout(() => btn.innerHTML = originalText, 2000);
                
                document.getElementById('erNo').value = '';
                document.getElementById('erAmount').value = '';
                document.getElementById('swipeAmount').value = '';
                refreshUI();
            });

            document.getElementById('filterAll').addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active'); currentFilter = 'all'; refreshUI();
            });
            
            document.getElementById('filterApproved').addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active'); currentFilter = 'approved'; refreshUI();
            });
            
            document.getElementById('filterNotApproved').addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active'); currentFilter = 'notApproved'; refreshUI();
            });

            document.getElementById('searchInput').addEventListener('input', function(e) {
                const search = e.target.value.toLowerCase();
                // Simple search implementation
            });

            // FIXED PDF Export Function
            document.getElementById('exportPdfBtn').addEventListener('click', function() {
                // Get the exceptions table data
                const exceptionsBody = document.getElementById('discrepancyBody').innerHTML;
                const currentDate = new Date().toLocaleDateString();
                
                // Create a styled HTML document for PDF
                const pdfContent = `
                    <div style="padding: 20px; font-family: Arial, sans-serif;">
                        <h2 style="color: #0b2b4a; text-align: center;">Onpoint Group - Fuel Recon Exceptions Report</h2>
                        <p style="text-align: center; color: #666;">Generated: ${currentDate}</p>
                        <hr style="margin: 20px 0;">
                        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                            <thead>
                                <tr style="background-color: #0b2b4a; color: white;">
                                    <th style="padding: 10px; border: 1px solid #ddd;">Date</th>
                                    <th style="padding: 10px; border: 1px solid #ddd;">Driver</th>
                                    <th style="padding: 10px; border: 1px solid #ddd;">ER No.</th>
                                    <th style="padding: 10px; border: 1px solid #ddd;">Requested (R)</th>
                                    <th style="padding: 10px; border: 1px solid #ddd;">Swiped (R)</th>
                                    <th style="padding: 10px; border: 1px solid #ddd;">Issue</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${exceptionsBody.replace(/<span class="badge-[^>]*>/g, '<span style="background: #f0f0f0; padding: 3px 10px; border-radius: 15px;">')}
                            </tbody>
                        </table>
                        <p style="margin-top: 30px; font-size: 12px; color: #999; text-align: center;">
                            This report includes all fuel transactions with exceptions (No ER or variance > R0.50)
                        </p>
                    </div>
                `;

                // Create temporary element and generate PDF
                const element = document.createElement('div');
                element.innerHTML = pdfContent;
                document.body.appendChild(element);
                
                // Generate PDF with better options
                html2pdf().from(element).set({
                    margin: [0.5, 0.5, 0.5, 0.5],
                    filename: `Fuel_Recon_Exceptions_${new Date().toISOString().split('T')[0]}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, letterRendering: true },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
                }).save().then(() => {
                    document.body.removeChild(element);
                });
            });

            // Initialize
            testConnection();
            refreshUI();
        })();
    </script>
</body>
</html>
